<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Bank Search</title>
    <link rel="stylesheet" href="blood_bank_directory.css">
</head>
<body>
    <form id="searchForm">
        <select id="state">
            <!-- States will be populated here -->
        </select>
        <select id="district">
            <!-- Districts will be populated based on state selection -->
        </select>
        <input type="text" id="hospitalName" placeholder="Enter Hospital Name">
        <button type="submit">Search</button>
    </form>
    <div id="results"></div>
    <script src="blood_bank_directory.js"></script>
</body>
</html>
